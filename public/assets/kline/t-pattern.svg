<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">T字线</text>
  <line x1="100" y1="60" x2="100" y2="240" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <!-- 没有上影线，开盘=收盘=最高 -->
  <line x1="85" y1="100" x2="115" y2="100" stroke="#ef4444" stroke-width="3"/>
  <!-- 下影线很长 -->
  <line x1="100" y1="100" x2="100" y2="220" stroke="#ef4444" stroke-width="3"/>
  <text x="100" y="260" text-anchor="middle" font-size="12" fill="#666">开盘=收盘=最高，形如"T"</text>
</svg>
