<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">阳线（红色）</text>
  <line x1="100" y1="60" x2="100" y2="240" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <!-- 上影线 -->
  <line x1="100" y1="80" x2="100" y2="110" stroke="#ef4444" stroke-width="3"/>
  <!-- 实体 -->
  <rect x="80" y="110" width="40" height="70" fill="#ef4444" rx="2"/>
  <!-- 下影线 -->
  <line x1="100" y1="180" x2="100" y2="210" stroke="#ef4444" stroke-width="3"/>
  <text x="100" y="260" text-anchor="middle" font-size="12" fill="#666">收盘 > 开盘（红色）</text>
</svg>
