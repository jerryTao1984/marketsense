<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">长上影线</text>
  <line x1="100" y1="60" x2="100" y2="240" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <!-- 上影线很长 -->
  <line x1="100" y1="70" x2="100" y2="150" stroke="#22c55e" stroke-width="3"/>
  <!-- 实体小（在底部） -->
  <rect x="85" y="150" width="30" height="25" fill="#22c55e" rx="2"/>
  <!-- 下影线短 -->
  <line x1="100" y1="175" x2="100" y2="195" stroke="#22c55e" stroke-width="3"/>
  <text x="100" y="260" text-anchor="middle" font-size="12" fill="#666">先涨后落，上影线长</text>
</svg>
