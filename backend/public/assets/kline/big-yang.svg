<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">大阳线</text>
  <line x1="100" y1="60" x2="100" y2="240" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <!-- 上影线短 -->
  <line x1="100" y1="80" x2="100" y2="100" stroke="#ef4444" stroke-width="3"/>
  <!-- 实体长 -->
  <rect x="80" y="100" width="40" height="100" fill="#ef4444" rx="2"/>
  <!-- 下影线短 -->
  <line x1="100" y1="200" x2="100" y2="220" stroke="#ef4444" stroke-width="3"/>
  <text x="100" y="260" text-anchor="middle" font-size="12" fill="#666">收盘远高于开盘</text>
</svg>
